services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    command: ["npx", "tsx", "src/index.ts"]
    # command: ["npx", "tsx", "src/index.ts", "--stub", "--approval"]

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

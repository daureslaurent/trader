services:
  mongo:
    image: mongo:7
    # Single-node replica set (rs0). A replica set — even with one member — is
    # required for MongoDB multi-document transactions, which submitTrade() relies
    # on for atomic trade + position + portfolio writes.
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    # Not published to the host — reachable only inside the compose network at
    # mongo:27017 (used by the backend's MONGO_URL).
    networks:
      - internal
    volumes:
      - ./data/mongodb:/data/db
    healthcheck:
      # Initiate the replica set on first boot, then report healthy once it has a
      # PRIMARY. Idempotent: rs.initiate() throws "already initialized" on reruns.
      test: >
        mongosh --quiet --eval '
          try { rs.status().ok }
          catch (e) {
            rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongo:27017" }] }).ok
          }
        '
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  backend:
    build: ./backend
    # Not published to the host — reachable only inside the compose network at
    # backend:3000, which the frontend's nginx proxies /api and /ws to.
    networks:
      - internal
    env_file: .env
    environment:
      # In-network single node; directConnection bypasses replica-set host
      # discovery while still permitting transactions against the rs0 primary.
      MONGO_URL: mongodb://mongo:27017/?directConnection=true
      MONGO_DB: cryptobot
    volumes:
      # Host self-update bridge: the "Update app" button drops a trigger file
      # here; a host systemd watcher (tools/updater) sees it and runs
      # update_run.sh. Bind-mounted so the trigger reaches the host.
      - ./.update:/app/.update
      # Read-only Docker socket: the System page reads per-container CPU/memory
      # for this compose project via the Docker API. Read-only — the app only
      # queries stats, never controls containers.
      - /var/run/docker.sock:/var/run/docker.sock:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    command: ["npx", "tsx", "src/index.ts"]
    # command: ["npx", "tsx", "src/index.ts", "--approval"]

  frontend:
    build: ./frontend
    # The only host-exposed port. nginx serves the SPA and reverse-proxies
    # /api and /ws to backend:3000 over the internal network.
    ports:
      - "5173:5173"
    networks:
      - internal
    depends_on:
      - backend
    restart: unless-stopped

networks:
  internal:
    driver: bridge
